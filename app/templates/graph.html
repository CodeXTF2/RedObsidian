{% extends "app_base.html" %}

{% block app_body %}
<main class="graph-layout" data-page="graph">
  <section class="graph-page-panel">
    <div class="graph-toolbar">
      <h1>Graph</h1>
      <div class="graph-toolbar-actions">
        <button id="zoom-out" type="button">-</button>
        <span id="zoom-level">100%</span>
        <button id="zoom-in" type="button">+</button>
        <button id="zoom-fit" type="button">Fit</button>
        <button id="add-node" type="button">New node</button>
      </div>
    </div>
    <div id="graph-canvas" class="graph-canvas graph-canvas-full">
      <svg id="edge-layer" aria-hidden="true"></svg>
      <svg id="draft-layer" aria-hidden="true"></svg>
      <div id="node-layer"></div>
    </div>
  </section>
  <aside id="graph-node-panel" class="document-shell graph-node-panel" hidden>
    <button id="close-panel" class="panel-close" type="button" title="Close panel">&times;</button>
    <form id="node-editor" class="node-editor">
      <div id="breadcrumb" class="breadcrumb"></div>
      <input id="node-title" class="title-input" placeholder="Untitled page" maxlength="120">
      <input id="node-caption" class="caption-input" placeholder="Add a caption" maxlength="280">
      <div id="node-color-picker" class="color-picker">
        <button type="button" class="color-swatch" data-color="" title="Default"></button>
        <button type="button" class="color-swatch color-red" data-color="red" title="Red"></button>
        <button type="button" class="color-swatch color-orange" data-color="orange" title="Orange"></button>
        <button type="button" class="color-swatch color-yellow" data-color="yellow" title="Yellow"></button>
        <button type="button" class="color-swatch color-green" data-color="green" title="Green"></button>
        <button type="button" class="color-swatch color-blue" data-color="blue" title="Blue"></button>
        <button type="button" class="color-swatch color-purple" data-color="purple" title="Purple"></button>
      </div>
      <div class="graph-actions">
        <button id="add-to-graph" class="add-to-graph-btn" type="button" hidden>Add to Graph</button>
      </div>
      <div id="node-notes" class="live-markdown-editor" contenteditable="true" data-placeholder="Write markdown..."></div>
    </form>
  </aside>
  <div id="graph-context-menu" class="context-menu" hidden>
    <button type="button" id="menu-new-node">New node</button>
    <button type="button" id="menu-delete-node" class="danger">Delete node</button>
    <button type="button" id="menu-delete-link" class="danger">Delete link</button>
  </div>
</main>
{% endblock %}
