{% extends "app_base.html" %}

{% block app_body %}
<main class="images-layout" data-page="images">
  <header class="page-header">
    <h1>Image Vault</h1>
    <p class="muted">Click an image to copy its markdown code.</p>
  </header>

  <div id="image-gallery" class="image-gallery">
    <div class="loading">Loading images...</div>
  </div>

  <div id="image-viewer" class="image-viewer" hidden>
    <div class="viewer-backdrop"></div>
    <div class="viewer-content">
      <button type="button" class="viewer-close">&times;</button>
      <img id="viewer-img" src="" alt="">
      <div class="viewer-actions">
        <button type="button" id="viewer-copy-md" class="viewer-btn">Copy Markdown</button>
      </div>
    </div>
  </div>
</main>
{% endblock %}
